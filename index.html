<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Necdet Oyunu - Responsive</title>

<style>
html,body{
    margin:0;
    padding:0;
    background:black;
    overflow:hidden;
    touch-action:none;
    font-family:Arial, sans-serif;
}
canvas{display:block;background:#222}

.screen{
    position:fixed;
    inset:0;
    display:none;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    background:rgba(0,0,0,0.9);
    z-index:20;
}
#menu{display:flex}

.menuBtn{
    padding:15px 30px;
    margin:10px;
    font-size:22px;
    border-radius:12px;
    border:none;
    background:#3fa9f5;
    color:white;
    cursor: pointer;
}

.controls{
    position:fixed;
    bottom:20px;
    right:20px; /* Kontrolleri sağa aldım ki oyun alanını kapamasın */
    display:grid;
    grid-template-columns:60px 60px 60px;
    grid-template-rows:60px 60px;
    gap:10px;
    z-index:10;
}
.btn{
    background:rgba(255,255,255,0.2);
    border: 1px solid rgba(255,255,255,0.4);
    border-radius:12px;
    color:white;
    font-size:26px;
    text-align:center;
    line-height:60px;
    user-select:none;
}

#exitKayak{
    position:fixed;
    top:15px;
    right:15px;
    padding:10px 18px;
    font-size:18px;
    border:none;
    border-radius:10px;
    background:#ff4444;
    color:white;
    display:none;
    z-index:30;
}
</style>
</head>
<body>

<button id="exitKayak">Çıkış</button>

<div id="menu" class="screen">
    <h1 style="color:white">NECDET OYUNU</h1>
    <button class="menuBtn" onclick="startGame()">▶️ Oyna</button>
    <button class="menuBtn" onclick="openSettings()">⚙️ Ayarlar</button>
</div>

<div id="settings" class="screen">
    <p style="color:red;font-size:20px;text-align:center">
        DAHA BİŞEY GELMEDİ BELKİ GELİR LAN SABUN<br>— Musti Baba
    </p>
    <button class="menuBtn" onclick="backToMenu()">⬅️ Çıkış</button>
</div>

<div id="death" class="screen">
    <h1 style="color:red">ÖLDÜN LAN SOĞAN!</h1>
    <button class="menuBtn" onclick="restartGame()">🔄 Yeniden Başlat</button>
    <button class="menuBtn" onclick="backToMenu()">🏠 Ana Menü</button>
</div>

<div id="win" class="screen">
    <h1 style="color:lime">KAZANDIN BE DOMATES!</h1>
    <button class="menuBtn" onclick="restartGame()">🔄 Tekrar Oyna</button>
    <button class="menuBtn" onclick="backToMenu()">🏠 Ana Menü</button>
</div>

<canvas id="game"></canvas>

<div class="controls">
    <div></div><div class="btn" id="up">⬆️</div><div></div>
    <div class="btn" id="left">⬅️</div>
    <div class="btn" id="down">⬇️</div>
    <div class="btn" id="right">➡️</div>
</div>

<script>
const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");
const exitKayak=document.getElementById("exitKayak");

// Ekran boyutuna göre ölçeklendirme çarpanı
let scale = 1;

function resize(){
    canvas.width=window.innerWidth;
    canvas.height=window.innerHeight;
    // Küçük ekranlarda objelerin devasa görünmemesi için bir ölçek belirleyelim
    scale = Math.min(canvas.width / 800, canvas.height / 600);
    if(scale < 0.6) scale = 0.6; // Çok küçük olmasın
    if(playing) resetGame(false); // Pozisyonları güncelle ama oyunu sıfırlama
}
window.addEventListener("resize",resize);

let playing=false;
let mode="normal";
let move={up:false,down:false,left:false,right:false};
let hearts=[];
let necdet,asya,golem,mega,winZone,kayakZone,cinar,soganOmer;
let message="",messageTimer=0;
let soaps=[],soapCount=0,lastSoapSpawn=0;
const SOAP_NEED=50;
let soganMessage="",soganTimer=0,soganStage=0;

let audioCtx=null;
function playBlup(){
    try {
        if(!audioCtx) audioCtx=new (window.AudioContext||window.webkitAudioContext)();
        const o=audioCtx.createOscillator();
        const g=audioCtx.createGain();
        o.type="sine";
        o.frequency.value=420;
        g.gain.value=0.1;
        o.connect(g); g.connect(audioCtx.destination);
        o.start();
        o.frequency.exponentialRampToValueAtTime(120,audioCtx.currentTime+0.1);
        g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+0.1);
        o.stop(audioCtx.currentTime+0.11);
    } catch(e) {}
}

function resetGame(fullReset = true){
    const w = canvas.width;
    const h = canvas.height;

    // Koordinatları ekran genişliği ve yüksekliğine (w, h) oranladık
    necdet={x: w*0.1, y: h*0.3, size: 35*scale, speed: 5, name:"Necdet"};
    asya={x: w*0.25, y: h*0.3, size: 35*scale, name:"Asya"};
    golem={x: w*0.3, y: h*0.7, size: 65*scale, speed: 1.2, name:"İksir Golemi", color:"#8000ff"};
    mega={x: w*0.1, y: h*0.8, size: 55*scale, speed: 1.5, name:"Mega Şövalye", color:"yellow"};
    winZone={x: w - (120*scale), y: 0, w: 120*scale, h: h, name:"Nedim Müzesi"};
    kayakZone={x: w*0.4, y: h*0.4, w: 140*scale, h: 80*scale};
    cinar={x: w*0.5, y: h*0.5, size: 50*scale};
    soganOmer={x: w*0.7, y: h*0.5, size: 35*scale, name:"Soğan Ömer", color:"#ff69b4"};

    if(fullReset) {
        mode="normal";
        hearts=[];
        soaps=[];
        soapCount=0;
        lastSoapSpawn=0;
        message="";
        soganMessage="";
        soganTimer=0;
        soganStage=0;
        exitKayak.style.display="none";
    }
}

function hideAll(){
    ["menu","settings","death","win"].forEach(id=>{
        document.getElementById(id).style.display="none";
    });
}

function startGame(){hideAll();resize();resetGame();playing=true;}
function restartGame(){hideAll();resetGame();playing=true;}
function openSettings(){hideAll();document.getElementById("settings").style.display="flex";}
function backToMenu(){hideAll();playing=false;document.getElementById("menu").style.display="flex";}

function drawName(t,x,y){
    ctx.fillStyle="white";
    ctx.font = (14*scale) + "px Arial";
    ctx.textAlign="center";
    ctx.fillText(t,x,y);
}

function spawnHeart(x,y){hearts.push({x,y,life:60});}

function rectHit(a,b){
    return a.x<b.x+b.w && a.x+a.size>b.x && a.y<b.y+b.h && a.y+a.size>b.y;
}

function spawnSoaps(){
    for(let i=0;i<5;i++){
        soaps.push({
            x: Math.random()*(canvas.width-20),
            y: Math.random()*(canvas.height-20),
            size: 15*scale
        });
    }
}

function update(){
    if(!playing) return;

    if(move.up) necdet.y-=necdet.speed;
    if(move.down) necdet.y+=necdet.speed;
    if(move.left) necdet.x-=necdet.speed;
    if(move.right) necdet.x+=necdet.speed;

    necdet.x=Math.max(0,Math.min(canvas.width-necdet.size,necdet.x));
    necdet.y=Math.max(0,Math.min(canvas.height-necdet.size,necdet.y));

    if(mode==="normal" && Date.now()-lastSoapSpawn>8000){
        spawnSoaps();
        lastSoapSpawn=Date.now();
    }

    soaps=soaps.filter(s=>{
        let hit=Math.hypot((necdet.x+necdet.size/2)-(s.x+s.size/2), (necdet.y+necdet.size/2)-(s.y+s.size/2)) < necdet.size;
        if(hit){soapCount++;playBlup();}
        return !hit;
    });

    if(mode==="normal"){
        if(Math.hypot(necdet.x-asya.x,necdet.y-asya.y)<50*scale && Math.random()<0.1)
            spawnHeart(asya.x,asya.y);

        [golem,mega].forEach(e=>{
            let dx=necdet.x-e.x, dy=necdet.y-e.y;
            let d=Math.hypot(dx,dy);
            e.x+=(dx/d)*e.speed;
            e.y+=(dy/d)*e.speed;
            if(d < (necdet.size/2 + e.size/2)){playing=false;document.getElementById("death").style.display="flex";}
        });

        if(soapCount>=SOAP_NEED && necdet.x+necdet.size > winZone.x){
            playing=false;
            document.getElementById("win").style.display="flex";
        }

        if(rectHit(necdet,kayakZone)){
            mode="kayak";
            exitKayak.style.display="block";
            necdet.x=20; necdet.y=20;
        }

        if(Math.hypot(necdet.x-soganOmer.x,necdet.y-soganOmer.y)<50*scale && soganStage===0){
            soganMessage="Sende bundan var mı";
            soganTimer=150;
            soganStage=1;
        }
    }

    if(soganTimer>0){
        soganTimer--;
        if(soganTimer===0 && soganStage===1){
            soganMessage="Ondan değil bundan";
            soganTimer=100;
            soganStage=2;
        }else if(soganTimer===0 && soganStage===2){
            playing=false;
            document.getElementById("death").style.display="flex";
        }
    }

    if(mode==="kayak"){
        if(Math.hypot(necdet.x-cinar.x,necdet.y-cinar.y)<50*scale){
            message="Mustafa Tam Bir Joni Sins";
            messageTimer=120;
        }
        if(messageTimer>0) messageTimer--;
    }

    hearts.forEach(h=>{h.y--;h.life--;});
    hearts=hearts.filter(h=>h.life>0);
}

function draw(){
    if(!playing) return;

    if(mode==="kayak"){
        ctx.fillStyle="white";
        ctx.fillRect(0,0,canvas.width,canvas.height);
    }else{
        ctx.fillStyle="#222";
        ctx.fillRect(0,0,canvas.width,canvas.height);
    }

    ctx.fillStyle="white";
    ctx.font=(20*scale)+"px Arial";
    ctx.textAlign="left";
    ctx.fillText("Sabun: "+soapCount+" / "+SOAP_NEED, 20, 40);

    ctx.fillStyle="#3fa9f5";
    ctx.fillRect(necdet.x,necdet.y,necdet.size,necdet.size);
    drawName(necdet.name,necdet.x+necdet.size/2,necdet.y-10);

    ctx.fillStyle="cyan";
    soaps.forEach(s=>ctx.fillRect(s.x,s.y,s.size,s.size));

    if(mode==="normal"){
        ctx.fillStyle="#ff69b4";
        ctx.fillRect(asya.x,asya.y,asya.size,asya.size);
        drawName(asya.name,asya.x+asya.size/2,asya.y-10);

        ctx.fillStyle=soganOmer.color;
        ctx.fillRect(soganOmer.x,soganOmer.y,soganOmer.size,soganOmer.size);
        drawName(soganOmer.name,soganOmer.x+soganOmer.size/2,soganOmer.y-10);

        if(soganTimer>0){
            ctx.fillStyle="#ff69b4";
            ctx.font=(32*scale)+"px Arial";
            ctx.textAlign="center";
            ctx.fillText(soganMessage, canvas.width/2, canvas.height/3);
        }

        if(soapCount<SOAP_NEED){
            ctx.fillStyle="#111";
            ctx.fillRect(winZone.x,winZone.y,winZone.w,winZone.h);
            ctx.fillStyle="white";
            ctx.font=(30*scale)+"px Arial";
            ctx.textAlign="center";
            ctx.fillText("🔒",winZone.x+winZone.w/2, 80);
        }else{
            ctx.fillStyle="#0a3";
            ctx.fillRect(winZone.x,winZone.y,winZone.w,winZone.h);
        }
        drawName(winZone.name,winZone.x+winZone.w/2, 30);

        ctx.fillStyle="cyan";
        ctx.fillRect(kayakZone.x,kayakZone.y,kayakZone.w,kayakZone.h);
        drawName("Kayak Merkezi",kayakZone.x+kayakZone.w/2,kayakZone.y-10);

        [golem,mega].forEach(e=>{
            ctx.fillStyle=e.color;
            ctx.fillRect(e.x,e.y,e.size,e.size);
            drawName(e.name,e.x+e.size/2,e.y-10);
        });

        hearts.forEach(h=>{
            ctx.font=(20*scale)+"px Arial";
            ctx.fillText("💖",h.x,h.y);
        });
    }

    if(mode==="kayak"){
        ctx.fillStyle="red";
        ctx.fillRect(cinar.x,cinar.y,cinar.size,cinar.size);
        drawName("Çınar",cinar.x+cinar.size/2,cinar.y-10);

        if(messageTimer>0){
            ctx.fillStyle="blue";
            ctx.font=(24*scale)+"px Arial";
            ctx.textAlign="center";
            ctx.fillText(message,canvas.width/2,80);
        }
    }
}

exitKayak.onclick=()=>{
    mode="normal";
    exitKayak.style.display="none";
    resetGame(false); 
};

function loop(){update();draw();requestAnimationFrame(loop);}
resize();
loop();

function bind(id,dir){
    const b=document.getElementById(id);
    const start = (e)=>{e.preventDefault();move[dir]=true; if(audioCtx && audioCtx.state==='suspended') audioCtx.resume();};
    const end = (e)=>{e.preventDefault();move[dir]=false};
    b.addEventListener("touchstart",start);
    b.addEventListener("touchend",end);
    b.addEventListener("mousedown",start);
    b.addEventListener("mouseup",end);
    b.addEventListener("mouseleave",end);
}
["up","down","left","right"].forEach(d=>bind(d,d));

addEventListener("keydown",e=>{
    if(audioCtx && audioCtx.state==='suspended') audioCtx.resume();
    if(e.key=="ArrowUp"||e.key=="w")move.up=true;
    if(e.key=="ArrowDown"||e.key=="s")move.down=true;
    if(e.key=="ArrowLeft"||e.key=="a")move.left=true;
    if(e.key=="ArrowRight"||e.key=="d")move.right=true;
});
addEventListener("keyup",e=>{
    if(e.key=="ArrowUp"||e.key=="w")move.up=false;
    if(e.key=="ArrowDown"||e.key=="s")move.down=false;
    if(e.key=="ArrowLeft"||e.key=="a")move.left=false;
    if(e.key=="ArrowRight"||e.key=="d")move.right=false;
});
</script>
</body>
</html>
